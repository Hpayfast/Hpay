<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{ box-sizing:border-box; }

body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{ width:100%; padding:20px; }

.header{
    display:flex;
    justify-content:space-between;
    color:#fff;
    margin-bottom:20px;
}

#timer{
    background:rgba(255,255,255,0.15);
    padding:6px 12px;
    border-radius:20px;
}

.card{
    max-width:420px;
    margin:auto;
    padding:25px;
    border-radius:20px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(20px);
    text-align:center;
    color:#fff;
}

.app{ font-size:22px; font-weight:600; }

.amount{ font-size:30px; font-weight:700; margin:15px 0; }

.client-box{
    text-align:left;
    background:rgba(255,255,255,0.15);
    padding:12px;
    border-radius:12px;
    margin-bottom:15px;
    font-size:14px;
}

.client-box div{
    margin-bottom:5px;
}

.upi-box{
    display:flex;
    gap:10px;
    margin-bottom:15px;
}

.upi-box input{
    flex:1;
    padding:10px;
    border-radius:10px;
    border:none;
}

.copy-btn{
    background:linear-gradient(45deg,#00c6ff,#0072ff);
    border:none;
    padding:10px;
    color:#fff;
    border-radius:10px;
    cursor:pointer;
}

.qr img{
    width:200px;
    background:#fff;
    padding:10px;
    border-radius:10px;
    margin:15px 0;
}

.utr input{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:none;
    margin-bottom:10px;
}

.submit-btn{
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:linear-gradient(45deg,#00f260,#0575e6);
    color:#fff;
    font-weight:600;
}

#utrMsg{ margin-top:10px; }
</style>
</head>

<body>

<div class="container">
    <div class="header">
        <div id="timer">10:00</div>
        <div>Repayment Available</div>
    </div>

    <div class="card">
        <div class="app">Cascas</div>
        <div class="amount">₹14,500</div>

        <!-- ✅ CLIENT DETAILS -->
        <div class="client-box">
            <div><strong>App:</strong>Cascas</div>
            <div><strong>Name:</strong>YOGESH PUNDLIK KOLI</div>
            <div><strong>Phone:</strong>918805975536</div>
            <div><strong>PAN:</strong>BKDPK6563N</div>
        </div>

        <div class="upi-box">
            <input id="upiInput" value="9098909735@bpaywallet" oninput="updateQR()">
            <button class="copy-btn" onclick="copyUPI()">Copy</button>
        </div>

        <div class="qr">
            <img id="qrImage">
        </div>

        <div class="utr">
            <input id="utrInput" placeholder="Enter 12-digit UTR">
            <button class="submit-btn" onclick="submitUTR()">Submit Payment</button>
            <div id="utrMsg"></div>
        </div>
    </div>
</div>

<script>
let time = 600;
const timerEl = document.getElementById("timer");

setInterval(()=>{
    if(time>0){
        time--;
        let m=Math.floor(time/60);
        let s=time%60;
        timerEl.textContent=`${m}:${s.toString().padStart(2,'0')}`;
    }
},1000);

function updateQR(){
    const upi=document.getElementById("upiInput").value.trim();
    document.getElementById("qrImage").src =
    "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa="+encodeURIComponent(upi);
}
updateQR();

function copyUPI(){
    navigator.clipboard.writeText(document.getElementById("upiInput").value);
    alert("UPI ID copied");
}

function submitUTR(){
    const utr=document.getElementById("utrInput").value.trim();
    const msg=document.getElementById("utrMsg");

    if(!/^[0-9]{12}$/.test(utr)){
        msg.style.color="red";
        msg.textContent="Invalid UTR";
        return;
    }

    msg.style.color="lightgreen";
    msg.textContent="Payment submitted successfully!";
}
</script>

</body>
</html>
